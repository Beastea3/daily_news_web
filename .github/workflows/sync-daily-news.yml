name: Sync daily news

on:
  schedule:
    # 06:19 Asia/Shanghai, using UTC-8 as the news date boundary.
    - cron: "19 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date override, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: sync-daily-news
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show sync configuration
        env:
          AGENT_SERVER_URL: ${{ secrets.AGENT_SERVER_URL }}
          AGENT_SERVER_TOKEN: ${{ secrets.AGENT_SERVER_TOKEN }}
          NEWS_DATE: ${{ inputs.date }}
          AGENT_JOB_TIMEOUT_MS: ${{ vars.AGENT_JOB_TIMEOUT_MS }}
          AGENT_POLL_INTERVAL_MS: ${{ vars.AGENT_POLL_INTERVAL_MS }}
          AGENT_MAX_RETRY_AFTER_MS: ${{ vars.AGENT_MAX_RETRY_AFTER_MS }}
        run: |
          echo "::group::Sync configuration"
          node - <<'NODE'
          const url = process.env.AGENT_SERVER_URL || "";
          let safeUrl = "[missing]";
          try {
            const parsed = new URL(url);
            safeUrl = `${parsed.origin}${parsed.pathname}`;
          } catch {}
          console.log(`AGENT_SERVER_URL: ${safeUrl}`);
          console.log(`AGENT_SERVER_TOKEN: ${process.env.AGENT_SERVER_TOKEN ? "present" : "missing"}`);
          const defaultDate = new Intl.DateTimeFormat("en-CA", {
            timeZone: "Etc/GMT+8",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          }).format(new Date());
          console.log("Default date timezone: UTC-8");
          console.log(`NEWS_DATE: ${process.env.NEWS_DATE || defaultDate}`);
          console.log(`AGENT_JOB_TIMEOUT_MS: ${process.env.AGENT_JOB_TIMEOUT_MS || "900000"}`);
          console.log(`AGENT_POLL_INTERVAL_MS: ${process.env.AGENT_POLL_INTERVAL_MS || "15000"}`);
          console.log(`AGENT_MAX_RETRY_AFTER_MS: ${process.env.AGENT_MAX_RETRY_AFTER_MS || "60000"}`);
          NODE
          echo "::endgroup::"

      - name: Generate news markdown
        env:
          AGENT_SERVER_URL: ${{ secrets.AGENT_SERVER_URL }}
          AGENT_SERVER_TOKEN: ${{ secrets.AGENT_SERVER_TOKEN }}
          NEWS_DATE: ${{ inputs.date }}
          AGENT_JOB_TIMEOUT_MS: ${{ vars.AGENT_JOB_TIMEOUT_MS }}
          AGENT_POLL_INTERVAL_MS: ${{ vars.AGENT_POLL_INTERVAL_MS }}
          AGENT_MAX_RETRY_AFTER_MS: ${{ vars.AGENT_MAX_RETRY_AFTER_MS }}
        run: node scripts/sync-daily-news.mjs

      - name: Validate build
        run: npm run build -- --webpack

      - name: Commit generated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/news/*.md
          if git diff --cached --quiet; then
            echo "No news changes to commit."
            exit 0
          fi
          git commit -m "chore: sync daily news"
          git push
